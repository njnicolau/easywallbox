    on_press:
      then:
        - ble_client.ble_write:
            id: wallbox_ble
            service_uuid: ${ble_service_uuid}
            characteristic_uuid: ${ble_char_main}
            value: !lambda |-
              std::string cmd = "$CMD,CHARGE,START,0\n";
              ESP_LOGI("wallbox", "CMD: %s", cmd.c_str());
              return std::vector<uint8_t>(cmd.begin(), cmd.end());

  - platform: template
    name: "${friendly_name} Detener Carga"
    icon: "mdi:stop-circle"
    on_press:
      then:
        - ble_client.ble_write:
            id: wallbox_ble
            service_uuid: ${ble_service_uuid}
            characteristic_uuid: ${ble_char_main}
            value: !lambda |-
              std::string cmd = "$CMD,CHARGE,STOP,0\n";
              ESP_LOGI("wallbox", "CMD: %s", cmd.c_str());
              return std::vector<uint8_t>(cmd.begin(), cmd.end());

  - platform: template
    name: "${friendly_name} Límite 6A"
    icon: "mdi:speedometer-slow"
    entity_category: config
    on_press:
      then:
        - ble_client.ble_write:
            id: wallbox_ble
            service_uuid: ${ble_service_uuid}
