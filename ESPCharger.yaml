            value: [0x24,0x45,0x45,0x50,0x2C,0x57,0x52,0x49,0x54,0x45,0x2C,0x49,0x44,0x58,0x2C,0x31,0x37,0x34,0x2C,0x31,0x30,0x0A]
        - sensor.template.publish:
            id: wallbox_user_limit_sensor
