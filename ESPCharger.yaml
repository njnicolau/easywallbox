            value: [0x24,0x45,0x45,0x50,0x2C,0x57,0x52,0x49,0x54,0x45,0x2C,0x49,0x44,0x58,0x2C,0x31,0x37,0x34,0x2C,0x36,0x0A]
        - sensor.template.publish:
            id: wallbox_user_limit_sensor
            state: 6.0

  - platform: template
    name: "${friendly_name} Límite 10A"
    icon: "mdi:speedometer-medium"
    entity_category: config
    on_press:
      then:
        - ble_client.ble_write:
            id: wallbox_ble
