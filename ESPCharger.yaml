  - platform: template
    name: "${friendly_name} Reautenticar"
    icon: "mdi:key-wireless"
    entity_category: config
    on_press:
      then:
        - ble_client.ble_write:
            id: wallbox_ble
            service_uuid: ${ble_service_uuid}
            characteristic_uuid: ${ble_char_main}
            value: !lambda |-
              std::string cmd = "$BLE,AUTH," + std::string("${wallbox_pin}") + "\n";
              ESP_LOGI("wallbox", "Re-enviando AUTH manual");
              return std::vector<uint8_t>(cmd.begin(), cmd.end());

  - platform: template
    name: "${friendly_name} Reconectar BLE"
    icon: "mdi:bluetooth-connect"
    entity_category: config
    on_press:
      then:
        - ble_client.disconnect:
            id: wallbox_ble
        - delay: 3s
        - ble_client.connect:
            id: wallbox_ble

  - platform: template
    name: "${friendly_name} Borrar Bonds BGX13P"
    icon: "mdi:bluetooth-off"
    entity_category: config
    on_press:
      then:
        - ble_client.ble_write:
            id: wallbox_ble
            service_uuid: ${ble_service_uuid}
            characteristic_uuid: ${ble_char_main}
            value: !lambda |-
              std::string cmd = "$BLE,AUTH," + std::string("${wallbox_pin}") + "\n";
              ESP_LOGI("wallbox", "Auth antes de borrar bonds");
              return std::vector<uint8_t>(cmd.begin(), cmd.end());
        - delay: 2s
        - ble_client.ble_write:
            id: wallbox_ble
            service_uuid: ${ble_service_uuid}
            characteristic_uuid: ${ble_char_main}
            value: !lambda |-
              std::string cmd = "$BLE,DEL,ALL\n";
              ESP_LOGI("wallbox", "Enviando BLE,DEL,ALL");
              return std::vector<uint8_t>(cmd.begin(), cmd.end());
        - delay: 1s
        - lambda: |-
            id(is_bonded) = false;
            ESP_LOGI("wallbox", "Borrando bond y reconectando...");
        - ble_client.remove_bond:
            id: wallbox_ble
        - delay: 2s
        - ble_client.disconnect:
            id: wallbox_ble
        - delay: 3s
        - ble_client.connect:
            id: wallbox_ble

  - platform: template
    name: "${friendly_name} Bruteforce SERV PIN"
    icon: "mdi:lock-search"
    entity_category: diagnostic
    on_press:
      then:
        - lambda: |-
            if (!id(wallbox_ble).connected()) {
              ESP_LOGW("wallbox", "No conectado — no se puede iniciar bruteforce");
              return;
            }
            ESP_LOGI("wallbox", "Iniciando bruteforce SERV PIN desde %04d", id(bruteforce_pin));
            id(bruteforce_running) = true;
        # Loop: envía $BLE,AUTH luego $BLE,SERV,NNNN, espera respuesta, incrementa
        # Ejecutamos en bloques de 10 para no bloquear el watchdog
        - while:
            condition:
              lambda: 'return id(bruteforce_running) && id(wallbox_ble).connected() && id(bruteforce_pin) <= 9999;'
            then:
              - ble_client.ble_write:
                  id: wallbox_ble
                  service_uuid: ${ble_service_uuid}
                  characteristic_uuid: ${ble_char_main}
                  value: !lambda |-
                    char buf[32];
                    snprintf(buf, sizeof(buf), "$BLE,SERV,%04d\n", id(bruteforce_pin));
                    int current_pin = id(bruteforce_pin);
                    id(bruteforce_pin)++;
                    if (current_pin % 500 == 0)
                      ESP_LOGI("wallbox", "Bruteforce progreso: %04d/9999 (%.1f%%)",
                               current_pin, current_pin / 99.99f);
                    std::string cmd(buf);
                    return std::vector<uint8_t>(cmd.begin(), cmd.end());
              - delay: 200ms  # Tiempo para recibir respuesta ASCII
              - if:
                  condition:
                    lambda: 'return (id(bruteforce_pin) % 100) == 0;'
                  then:
                    - delay: 500ms  # Pausa para watchdog/scanner

  - platform: template
    name: "${friendly_name} Reset Bruteforce"
    icon: "mdi:restart"
    entity_category: diagnostic
    on_press:
      then:
        - lambda: |-
            id(bruteforce_pin) = 0;
            id(bruteforce_running) = false;
            id(service_pin_found) = -1;
            ESP_LOGI("wallbox", "Bruteforce reseteado");

  - platform: template
    name: "${friendly_name} Diagnóstico PIN BGX13P"
    icon: "mdi:key-outline"
    entity_category: diagnostic
    on_press:
      then:
        # Consulta el PIN configurado en el BGX13P y el nivel de seguridad
        - ble_client.ble_write:
            id: wallbox_ble
            service_uuid: ${ble_service_uuid}
            characteristic_uuid: ${ble_char_main}
            value: !lambda |-
              std::string cmd = "$BLE,AUTH," + std::string("${wallbox_pin}") + "\n";
              ESP_LOGI("wallbox", "AUTH para diagnostico");
              return std::vector<uint8_t>(cmd.begin(), cmd.end());
        - delay: 1s
        - ble_client.ble_write:
            id: wallbox_ble
            service_uuid: ${ble_service_uuid}
            characteristic_uuid: ${ble_char_main}
            value: !lambda |-
              // Consulta el passkey configurado en el BGX13P
              std::string cmd = "$BLE,GET,PASSKEY\n";
              ESP_LOGI("wallbox", "Enviando GET PASSKEY");
              return std::vector<uint8_t>(cmd.begin(), cmd.end());
        - delay: 1s
        - ble_client.ble_write:
            id: wallbox_ble
            service_uuid: ${ble_service_uuid}
            characteristic_uuid: ${ble_char_main}
            value: !lambda |-
              // Consulta el nivel de seguridad BLE del BGX13P
              std::string cmd = "$BLE,GET,SECLVL\n";
              ESP_LOGI("wallbox", "Enviando GET SECLVL");
              return std::vector<uint8_t>(cmd.begin(), cmd.end());
        - delay: 1s
        - ble_client.ble_write:
            id: wallbox_ble
            service_uuid: ${ble_service_uuid}
            characteristic_uuid: ${ble_char_main}
            value: !lambda |-
              // Consulta si el bonding está habilitado
              std::string cmd = "$BLE,GET,BOND\n";
              ESP_LOGI("wallbox", "Enviando GET BOND");
              return std::vector<uint8_t>(cmd.begin(), cmd.end());

################################################################################
# NÚMERO — Slider de límite personalizado
################################################################################
number:
  - platform: template
    name: "${friendly_name} Límite de Carga"
    id: set_user_limit
    min_value: 6
    max_value: 32
    step: 1
    unit_of_measurement: "A"
    icon: "mdi:current-ac"
    optimistic: true
    restore_value: true
    initial_value: 16
    set_action:
      then:
        - ble_client.ble_write:
            id: wallbox_ble
            service_uuid: ${ble_service_uuid}
            characteristic_uuid: ${ble_char_main}
            value: !lambda |-
              int limit = (int)x;
              std::string cmd = "$EEP,WRITE,IDX,174," + std::to_string(limit) + "\n";
              ESP_LOGI("wallbox", "Limite ajustado a %d A", limit);
              return std::vector<uint8_t>(cmd.begin(), cmd.end());
        - sensor.template.publish:
            id: wallbox_user_limit_sensor
            state: !lambda 'return x;'
